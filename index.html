<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dietit - خطة التخسيس الذكية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.2);
        }

        header h1 { font-size: 32px; margin-bottom: 10px; }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 850px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
            font-size: 22px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            background-color: #fafafa;
        }

        button {
            width: 100%;
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 14px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        button:hover { background-color: #27ae60; }

        .progress-box {
            display: flex;
            justify-content: space-around;
            background: #e8f8f0;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: center;
        }

        .progress-box .num {
            font-size: 26px;
            font-weight: bold;
            color: #27ae60;
        }

        .food-list {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
        }

        .food-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #f1f1f1;
            font-size: 15px;
        }

        .badge {
            background-color: #e74c3c;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Dietit - تطبيق إدارة خطة التخسيس</h1>
        <p>نظام ذكي متكامل مبني على ملف خطة تخسيس V.1.1</p>
    </header>

    <div class="grid-layout">
        <!-- قسم حاسبة الوجبات والسعرات الحالية -->
        <div class="card">
            <h2>🛒 اختيار وإضافة الوجبات (calculator)</h2>
            
            <div class="form-group">
                <label>اختر نوع النظام الغذائي:</label>
                <select id="dietType" onchange="updateMeals()">
                    <option value="تخسيس/ تثبيت">تخسيس/ تثبيت</option>
                    <option value="زيادة الوزن">زيادة الوزن</option>
                </select>
            </div>

            <div class="form-group">
                <label>اختر الوجبة:</label>
                <select id="mealType" onchange="updateFoods()">
                    <!-- يتم تعبئته ديناميكياً -->
                </select>
            </div>

            <div class="form-group">
                <label>اختر الأكلة المتاحة:</label>
                <select id="foodSelect">
                    <!-- يتم تعبئته ديناميكياً -->
                </select>
            </div>

            <button onclick="addFood()">إضافة الوجبة المستهلكة الي اليوم</button>

            <div class="progress-box">
                <div>
                    <div>المستهلك اليوم</div>
                    <div class="num" id="consumedCalories">0</div>
                </div>
                <div>
                    <div>المستهدف اليومي ($Target$)</div>
                    <div class="num" id="targetCalories">1650</div>
                </div>
            </div>
        </div>

        <!-- قسم لوحة المتابعة والتقدم اليومي -->
        <div class="card">
            <h2>📈 لوحة المتابعة والتقدم (التقدم)</h2>
            <div class="form-group">
                <label>تعديل السعرات المستهدفة لليوم ($Target$):</label>
                <input type="number" id="targetInput" value="1650" onchange="updateTarget()">
            </div>
            
            <div style="font-weight: bold; margin-bottom: 10px; color: #2c3e50;">الوجبات التي تم تناولها اليوم:</div>
            <div class="food-list" id="todayLog">
                <!-- الوجبات المضافة ستظهر هنا -->
            </div>
        </div>
    </div>
</div>

<script>
    // قاعدة البيانات المستخرجة مباشرة من شيت Data في ملف خطة تخسيس V.1.1.xlsx
    const foodDatabase = [
        { diet: "تخسيس/ تثبيت", meal: "غداء", name: "كوب مكرونة بالبروتين", calories: 235 },
        { diet: "تخسيس/ تثبيت", meal: "غداء/ سناك", name: "5 حبات ورق عنب", calories: 205 },
        { diet: "تخسيس/ تثبيت", meal: "سناك", name: "كوب أرز بلبن", calories: 200 },
        { diet: "تخسيس/ تثبيت", meal: "غداء", name: "نصف رغيف بلدي بروتين", calories: 180 },
        { diet: "تخسيس/ تثبيت", meal: "فطار/ عشاء", name: "4 إلى 5 ملاعق فول مدمس (بالزيت)", calories: 180 },
        { diet: "تخسيس/ تثبيت", meal: "فطار/ عشاء", name: "نصف رغيف بلدي بالجبن القريش او الفيتا", calories: 180 },
        { diet: "تخسيس/ تثبيت", meal: "غداء", name: "كوب شوربة عدس", calories: 175 },
        { diet: "تخسيس/ تثبيت", meal: "سناك", name: "3 أكواب فشار بالزبدة", calories: 170 },
        { diet: "تخسيس/ تثبيت", meal: "سناك", name: "نصف كوب بطاطا بالقشطة المشوية", calories: 170 },
        { diet: "زيادة الوزن", meal: "سناك", name: "قطعة كنافة بالجبنة", calories: 225 },
        { diet: "زيادة الوزن", meal: "سناك", name: "قطعتين قطايف بالجبنة", calories: 225 },
        { diet: "زيادة الوزن", meal: "سناك", name: "قطعة بسبوسة", calories: 205 },
        { diet: "زيادة الوزن", meal: "غداء/فطار/عشاء", name: "بيتزا صغيرة بالجبن أو بروتين", calories: 195 }
    ];

    let totalConsumed = 0;
    let currentTarget = 1650;

    function updateMeals() {
        const dietType = document.getElementById("dietType").value;
        const mealSelect = document.getElementById("mealType");
        
        // الحصول على الوجبات الفريدة المتاحة لهذا النظام
        const meals = [...new Set(foodDatabase.filter(f => f.diet === dietType).map(f => f.meal))];
        
        mealSelect.innerHTML = "";
        meals.forEach(meal => {
            let opt = document.createElement("option");
            opt.value = meal;
            opt.innerText = meal;
            mealSelect.appendChild(opt);
        });
        updateFoods();
    }

    function updateFoods() {
        const dietType = document.getElementById("dietType").value;
        const mealType = document.getElementById("mealType").value;
        const foodSelect = document.getElementById("foodSelect");
        
        const foods = foodDatabase.filter(f => f.diet === dietType && f.meal === mealType);
        
        foodSelect.innerHTML = "";
        foods.forEach(food => {
            let opt = document.createElement("option");
            opt.value = food.calories;
            opt.innerText = `${food.name} (${food.calories} سعر)`;
            foodSelect.appendChild(opt);
        });
    }

    function addFood() {
        const foodSelect = document.getElementById("foodSelect");
        if(!foodSelect.value) return;
        
        const calories = parseInt(foodSelect.value);
        const name = foodSelect.options[foodSelect.selectedIndex].text;
        
        totalConsumed += calories;
        document.getElementById("consumedCalories").innerText = totalConsumed;
        
        // إضافة الوجبة لجدول المتابعة اليومي
        const todayLog = document.getElementById("todayLog");
        const item = document.createElement("div");
        item.className = "food-item";
        item.innerHTML = `<span>${name}</span> <span class="badge">+ ${calories} سعر</span>`;
        todayLog.appendChild(item);
    }

    function updateTarget() {
        currentTarget = document.getElementById("targetInput").value;
        document.getElementById("targetCalories").innerText = currentTarget;
    }

    // تشغيل الفلترة المبدئية عند فتح الموقع
    updateMeals();
</script>

</body>
</html>
